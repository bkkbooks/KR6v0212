body:
  text: 之一碑陽石窟寺主僧斌南石窟寺之碑夫玄猷沖容而繁塵其暉冥淵澄鏡而綺波式其澗使三有紛離六塵囂翳輪迴幽塗迷趣靡返者也是以至覺垂悲拯彼沉溺闡三之火宅秉湛一之維則騰道於妙境叵夕暉慧日之旦大千矚常樂之慈風若不遷之訓周誨於昏明万化無虧之範永播於幽顯通塞歸乎有緣行藏盛皇帝陛下聖契潛通應期纂曆道氣籠三才之經至德蓋五常之緯啟唐魏五教遐融禮風遠制慈導開章真宗顯誥戒綱羈乎有心政觀變乎彼岸之於茲將濟矣自惟鴻源帝鄉庇鄰雲液議蹤翼親論疇懿胕榮要山河連基齊晉遂得金於雲階班爵五等垂玉於丹墀內備幃幄外委霜專節戎場闢土之效未申耀威志靡建豈謂乾蔭雲敷皇澤雨灑沖旨徧加春華交暎勢均兩嶽曜軒三蕃列土崇海量介焉罔酬遂尋案經教追訪法圖冥福起於顯誓鴻報發於涓心悟尋訓旨建厥涇陽簡茲名埠重巒煙蔚景氣之初交川流泱瀁鮮榮之後暢飛峭合霄玄崖吐液峙冥造之形風水蕭散嗂韻之勢命匠呈奇競工開剖積節移年營構乃就圖雙林之遺於玄堂規住聖之鴻質則巍嶷於虛室群像垂霄容之朗眾影表朱光之鮮暉暉焉若饘岌岌焉如踊出之應法機又構以房館建之堂閣藻潔渟津蔭殊例靜宇禪區眾窮微之僧近跧通寂之儁蹠塵誠裨乎治端豪績瑍乎不朽刊銘寺庭遂興頌曰攸攸冥造寥寥太虛動以應有靜以照无穹經垂像淳化亦敷囂紛道隱昏塗造四色俗流競波愛根爭殖迴住幽衢沈淪邪或聖覺匪運真圖詎測至哉大覺持暢靈姿廓茲聖維大千被化幽境蒙暉潛神吐曜應我皇機聖皇玄感協揚治猷道液垂津冥被九區慧鏡長幽三乘既駕六塵斯流餐沐法膏澡心道津鴻源流衍是近是親均感遐舊痛躬罔報建斯嘉因重阿疊巖蔚暎陽川邃戶飛窗翠錯暉妍雙林運矣遺儀更鮮永證一大魏永平三年歲在庚寅四月壬寅朔十四日乙卯使持節都督涇州諸軍事平西將軍涇州刺史安武縣開國男奚康生造之二碑陰平西府長史河南陳平法司馬敷西男安定皇甫慎鎧曹參軍趙功錄事參軍扶風馬瓚田曹參軍隴西董辯功曹參軍寧遠將軍華容男屈字允府昌黎人默曹參軍達倉曹參軍奮威將軍赭陽子梁瑞字神賁天水人中兵參軍略陽王卯廣府主薄天水尹寧字慶安外兵參軍金城趙忻字興慶騎兵參軍事督護安定內史遼西段延字豐容長流參軍昌黎韓洪超城局參軍新平馮澄字清龍參軍事馮翌鷹揚將軍參軍事北海邴哲別駕從事史酒從事史安定皇甫詢白土令南陽鄧生安遠將軍統軍治中史安涇陽王胤祖安定郡丞沛國劉龜臨洮太守三水令恒農楊伯儁征虜將軍安定內史臨平雷熾平涼郡丞濟南侯安定胡虯爰得令司郡羅宗平涼太守朝那原郭松茂新平郡丞京兆韋文總鶉觚令南安姚玉新平太守參軍事安定席道原趙平郡丞上谷趙椿陰密令扶風馬允咸寧朔將軍趙平太守臨涇縣開國從事張廣昌隴東郡丞黃龍馮法孫俎厲令逸隴東太守領汧城戌河南部郡從事史平涼員英安定令熒陽子武威陰愍撫夷令明別駕從事史安定胡武伯部郡從事史馮翌田雍芝臨涇令男茹河南陰槃令平漠將軍統軍兼別駕主簿安定胡文安門下督北地傅神苻石堂令高平令主簿平涼員祥省事安定胡季安朝那涇陽令主簿兼州別駕從事史安定梁僧授烏氏德西曹主簿趙平彭丙沓法發西不朽誠乎品仲止於高蹤兩能眾嚴厲成於幼稚此橋於郁哲謀約賓等尸鳩故以剋挫之妣言施於安子俠溫飽是陶豈非天性陶又武刺刑部終復襲爵者當非不義歆以吾封非淹兄弟不得獨自跨擁逮世輝則不及孫故以銘之
